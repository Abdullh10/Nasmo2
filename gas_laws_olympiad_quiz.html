<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أولمبياد الكيمياء — قوانين الغازات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f8fa;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #d0d7de;
    --border2: #b0b8c1;
    --text: #1a1f2e;
    --text2: #57606a;
    --text3: #8c959f;
    --blue: #0969da;
    --blue-bg: #ddf4ff;
    --green: #1a7f37;
    --green-bg: #dafbe1;
    --red: #cf222e;
    --red-bg: #fff0f0;
    --amber: #9a6700;
    --amber-bg: #fff8c5;
    --purple: #6639ba;
    --purple-bg: #fbefff;
    --teal: #1b7c83;
    --accent: #0969da;
    --radius: 10px;
    --radius-lg: 16px;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(246,248,250,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #0550ae, #0d6e56);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text2);
  }
  .progress-bar {
    width: 160px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0550ae, #0969da);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── LAYOUT ── */
  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    animation: slideIn 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface2);
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }
  .badge-num   { background: var(--blue-bg);   color: var(--blue);   border: 1px solid #1f6feb44; }
  .badge-level { background: var(--amber-bg);  color: var(--amber);  border: 1px solid #d2992244; }
  .badge-topic { background: var(--purple-bg); color: var(--purple); border: 1px solid #a371f744; }

  .q-body { padding: 1.5rem; }

  .context-block {
    background: var(--surface2);
    border-right: 3px solid var(--blue);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 0.9rem 1.1rem;
    margin-bottom: 1.25rem;
    font-size: 13.5px;
    color: var(--text2);
    white-space: pre-line;
    line-height: 1.8;
  }

  .graph-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 1.25rem;
  }
  .graph-wrap svg {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .q-text {
    font-size: 15.5px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 1.25rem;
    line-height: 1.75;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 0.85rem 1.1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #ffffff;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: right;
    line-height: 1.65;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    width: 100%;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--blue);
    background: var(--blue-bg);
    transform: translateX(-2px);
  }
  .opt:disabled { cursor: default; }
  .opt.correct {
    border-color: var(--green);
    background: var(--green-bg);
    color: #aff5b4;
  }
  .opt.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    color: #ffa198;
  }
  .opt-lbl {
    font-weight: 700;
    font-size: 12px;
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: var(--mono);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .opt.correct .opt-lbl { background: #dafbe1; color: #1a7f37; border-color: #1a7f37; }
  .opt.wrong   .opt-lbl { background: #fff0f0; color: #cf222e; border-color: #cf222e; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 1.25rem;
    padding: 1.1rem 1.25rem;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.8;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .feedback.ok  { background: var(--green-bg); border: 1px solid #2ea04388; color: #aff5b4; }
  .feedback.err { background: var(--red-bg);   border: 1px solid #f8514988; color: #ffa198; }
  .fb-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .fb-formula {
    font-family: var(--mono);
    background: rgba(0,0,0,0.3);
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 12px;
  }

  /* ── NEXT BTN ── */
  .btn-next {
    margin-top: 1.25rem;
    padding: 0.65rem 1.6rem;
    background: #0969da;
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: none;
  }
  .btn-next:hover  { background: #0550ae; }
  .btn-next:active { transform: scale(0.97); }

  /* ── SCORE CARD ── */
  .score-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    animation: slideIn 0.4s ease;
  }
  .score-ring {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: conic-gradient(#0969da var(--pct), #d0d7de 0);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    position: relative;
  }
  .score-ring::after {
    content: '';
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--surface);
    position: absolute;
  }
  .score-num {
    font-size: 32px;
    font-weight: 700;
    color: #0969da;
    position: relative;
    z-index: 1;
    font-family: var(--mono);
  }
  .score-msg {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 0.4rem;
    color: var(--text);
  }
  .score-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 2rem;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 0.5rem;
  }
  .stat-n   { font-size: 26px; font-weight: 700; font-family: var(--mono); }
  .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .stat-n.g { color: #1a7f37; }
  .stat-n.r { color: #cf222e; }
  .stat-n.b { color: #0969da; }

  .review-list { text-align: right; margin-bottom: 2rem; }
  .review-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .review-item:last-child { border-bottom: none; }
  .ri-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ri-dot.ok  { background: var(--green); }
  .ri-dot.err { background: var(--red); }
  .ri-q { flex: 1; color: var(--text2); }
  .ri-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .ri-badge.ok  { background: var(--green-bg); color: var(--green); }
  .ri-badge.err { background: var(--red-bg);   color: var(--red); }

  .btn-restart {
    padding: 0.75rem 2.5rem;
    border: 1px solid #0969da;
    border-radius: var(--radius);
    background: transparent;
    color: #0969da;
    font-size: 14px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-restart:hover { background: #ddf4ff; }

  /* ── DECORATIVE BG GRID ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(#d0d7de 1px, transparent 1px),
      linear-gradient(90deg, #d0d7de 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  .main { position: relative; z-index: 1; }
  .site-header { position: sticky; z-index: 100; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .main { padding: 1.5rem 1rem 3rem; }
    .q-body { padding: 1.1rem; }
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .score-wrap { padding: 2rem 1rem; }
  }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->

  <div class="logo">
    <div class="logo-icon">⚗</div>
    <span>أولمبياد الكيمياء الوطني</span>
  </div>
  <div class="progress-wrap">
    <span id="prog-label">0 / 10</span>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
</header>

<!-- ══ MAIN ══ -->
<main class="main" id="app"></main>

{

/* ═══════════════════════════════════════════════
   STATE & RENDER
═══════════════════════════════════════════════ */
let cur=0, score=0, ans=new Array(Q.length).fill(undefined);

function render(){
  const app=document.getElementById('app');
  document.getElementById('prog-label').textContent=`${cur} / ${Q.length}`;
  document.getElementById('prog-fill').style.width=(cur/Q.length*100)+'%';

  if(cur>=Q.length){ showScore(app); return; }

  const q=Q[cur];
  const done=ans[cur]!==undefined;
  const ua=ans[cur];

  const graphHTML=q.graph
    ?`<div class="graph-wrap">${q.graph}</div>`
    :'';

  const optsHTML=q.opts.map((o,i)=>{
    const lbls=['أ','ب','ج','د'];
    let cls='opt';
    if(done){
      if(i===q.ans) cls+=' correct';
      else if(i===ua) cls+=' wrong';
    }
    return `<button class="${cls}" onclick="pick(${i})" ${done?'disabled':''}>`+
      `<span class="opt-lbl">${lbls[i]}</span>`+
      `<span>${o}</span>`+
      `</button>`;
  }).join('');

  const fbHTML=done
    ?`<div class="feedback ${ua===q.ans?'ok':'err'}">`+
     `<div class="fb-title">${ua===q.ans?'✓ إجابة صحيحة':'✗ إجابة خاطئة'}</div>`+
     `<div>${ua===q.ans?q.fb_ok:q.fb_err}</div>`+
     `</div>`
    :'';

  app.innerHTML=`
    <div class="q-card">
      <div class="q-header">
        <span class="badge badge-num">سؤال ${cur+1} / 10</span>
        <span class="badge badge-level">${q.level}</span>
        <span class="badge badge-topic">${q.topic}</span>
      </div>
      <div class="q-body">
        <div class="context-block">${q.context}</div>
        ${graphHTML}
        <div class="q-text">${q.q}</div>
        <div class="options">${optsHTML}</div>
        ${fbHTML}
        ${done?`<button class="btn-next" style="display:block" onclick="next()">
          ${cur<Q.length-1?'السؤال التالي ←':'عرض النتيجة ←'}
        </button>`:''}
      </div>
    </div>`;
}

function pick(i){
  if(ans[cur]!==undefined) return;
  ans[cur]=i;
  if(i===Q[cur].ans) score++;
  render();
}

function next(){ cur++; render(); }

function showScore(app){
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-label').textContent='10 / 10';

  const pct=Math.round(score/Q.length*100);
  const msgs=[
    [90,'أداء استثنائي — مستوى أولمبياد دولي!'],
    [70,'أداء متميز — مرشح قوي للأولمبياد'],
    [50,'أداء جيد — راجع المفاهيم الأساسية'],
    [0,'تحتاج مراجعة شاملة لقوانين الغازات']
  ];
  const msg=msgs.find(([t])=>pct>=t)[1];

  const reviewHTML=Q.map((q,i)=>{
    const ok=ans[i]===q.ans;
    return `<div class="review-item">`+
      `<span class="ri-dot ${ok?'ok':'err'}"></span>`+
      `<span class="ri-q">س${i+1}: ${q.topic}</span>`+
      `<span class="ri-badge ${ok?'ok':'err'}">${ok?'صواب':'خطأ'}</span>`+
      `</div>`;
  }).join('');

  app.innerHTML=`
    <div class="score-wrap">
      <div class="score-ring" style="--pct:${pct*3.6}deg">
        <span class="score-num">${score}/10</span>
      </div>
      <div class="score-msg">${msg}</div>
      <div class="score-sub">النسبة: ${pct}%</div>
      <div class="stats-grid">
        <div class="stat-cell"><div class="stat-n g">${score}</div><div class="stat-lbl">صحيح</div></div>
        <div class="stat-cell"><div class="stat-n r">${Q.length-score}</div><div class="stat-lbl">خطأ</div></div>
        <div class="stat-cell"><div class="stat-n b">${pct}%</div><div class="stat-lbl">النسبة</div></div>
      </div>
      <div class="review-list">${reviewHTML}</div>
      <button class="btn-restart" onclick="restart()">إعادة الاختبار</button>
    </div>`;
}

function restart(){
  cur=0; score=0; ans=new Array(Q.length).fill(undefined);
  render();
}

render();
</script>
